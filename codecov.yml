# Codecov config for zenflow. Thresholds match goai's setup so the two
# sister repos report on the same gate.

coverage:
  status:
    project:
      default:
        target: 90%
        threshold: 2%
    patch:
      default:
        target: 90%

comment:
  layout: "diff"
  behavior: default
  require_changes: false

ignore:
  # Example mains - //go:build example, never executed in CI.
  - "examples/"
  # Workflow conformance fixtures (YAML inputs, not Go).
  - "spec/v1/testcases/"
  # CLI dispatch boilerplate (flag-parsing + subcommand routing). The
  # underlying behaviour is exercised through cmd/zenflow integration
  # tests; the dispatch shell carries no logic worth covering line-level.
  - "cmd/zenflow/main.go"
