# Codecov config for zenflow.
#
# Coverage status: informational (does NOT gate PRs initially)  -  the repo
# already enforces 100% per-function coverage at pre-commit time, so the
# Codecov gate is purely for trend visualisation and reviewer
# convenience. Flip `informational` to false once the per-package
# coverage policy stabilises post-OSS launch.

coverage:
  status:
    project:
      default:
        informational: true
        threshold: 1%
    patch:
      default:
        informational: true
        threshold: 1%

comment:
  layout: "diff"
  behavior: default
  require_changes: false

ignore:
  # Generated example mains  -  //go:build example, never executed in CI.
  - "examples/"
  # Workflow conformance fixtures (YAML inputs, not Go).
  - "spec/v1/testcases/"
  # CLI dispatch boilerplate (flag-parsing + subcommand routing). The
  # underlying behaviour is exercised through cmd/zenflow integration
  # tests; the dispatch shell carries no logic worth covering line-level.
  - "cmd/zenflow/main.go"
