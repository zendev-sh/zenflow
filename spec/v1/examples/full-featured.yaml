# Full Featured -- Demonstrates all fields: agents, tools, timeouts, retries,
# file references, options, conditions, loops, and includes.

name: full-featured-workflow
version: 1
description: A comprehensive workflow demonstrating every zenflow feature.

agents:
  planner:
    description: "Technical lead who creates implementation plans."
    prompt: "@prompts/planner.md"
    model: "bedrock/anthropic.claude-sonnet-4-6"
    tools:
      - bash
      - read
      - write
      - glob
      - grep
    disallowedTools:
      - bash
    maxTurns: 10
  coder:
    description: "Senior developer who writes production Go code."
    prompt: "@prompts/coder.md"
    model: "bedrock/anthropic.claude-sonnet-4-6"
    tools:
      - write
      - read
      - bash
    maxTurns: 25
  reviewer:
    description: "Code reviewer who ensures quality and correctness."
    model: "bedrock/anthropic.claude-sonnet-4-6"
    tools:
      - read
      - bash
    maxTurns: 15
  deployer:
    description: "DevOps engineer who handles deployment."
    model: "bedrock/anthropic.claude-sonnet-4-6"
    tools:
      - bash
    maxTurns: 20

includes:
  deploy_pipeline: "workflows/deploy.yaml"

steps:
  - id: plan
    agent: planner
    instructions: "@instructions/plan-feature.md"
    contextFiles:
      - "docs/architecture.md"
      - "docs/api-spec.yaml"
    timeout: "10m"

  - id: implement
    agent: coder
    instructions: "Implement the feature according to the plan."
    dependsOn:
      - plan
    timeout: "30m"
    retries: 2
    contextFiles:
      - "src/main.txt"

  - id: code_review
    agent: reviewer
    instructions: "Review the implementation for bugs, performance issues, and style."
    dependsOn:
      - implement
    timeout: "15m"
    condition: "steps.implement.status == 'completed'"

  - id: fix_issues
    agent: coder
    instructions: "Fix all issues found in code review."
    dependsOn:
      - code_review
    timeout: "20m"
    retries: 1
    condition: "steps.code_review.content.contains('CHANGES_REQUESTED')"

  - id: test
    agent: coder
    instructions: "Write and run unit tests for the implementation."
    dependsOn:
      - implement
    timeout: "15m"
    model: "bedrock/anthropic.claude-sonnet-4-6"

  - id: deploy_staging
    include: deploy_pipeline
    dependsOn:
      - code_review
      - test
    timeout: "1h"
    retries: 1

options:
  maxConcurrency: 4
  onStepFailure: skip-dependents
  stepTimeout: "30m"
  isolation: "worktree-per-step"
  scheduler: dependency-first
