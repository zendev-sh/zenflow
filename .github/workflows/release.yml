name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-versions-json
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      # contents: write  -  GoReleaser publishes the GitHub Release and the
      # versions.json commit step pushes to main.
      # packages: write  -  GoReleaser publishes container images to ghcr.io.
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25'

      - name: Verify build
        run: go build ./...

      - name: Run tests
        run: go test -race ./...

      - name: Set up QEMU (multi-arch docker builds)
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          # Pin the GoReleaser binary to v2 minor releases. Future v3 may
          # drop support for the `dockers:` block currently used (which
          # emits deprecation warnings under v2). The `brews:` ->
          # `homebrew_casks:` migration is already done.
          # Pinning to v2.x lets the action pull whatever the latest
          # v2 patch is at release time without a breaking
          # major-version jump silently torching the launch.
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Update versions.json
        env:
          TAG: ${{ github.ref_name }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          export DATE
          if [ ! -f docs/public/versions.json ]; then
            echo '{"latest":"","versions":[]}' > docs/public/versions.json
          fi
          cat docs/public/versions.json | \
            python3 -c "
          import json, sys, os
          data = json.load(sys.stdin)
          tag = os.environ['TAG']
          date = os.environ['DATE']
          data['latest'] = tag
          if not any(v['tag'] == tag for v in data['versions']):
              data['versions'].insert(0, {'tag': tag, 'date': date, 'label': tag + ' (latest)'})
          for v in data['versions']:
              v['label'] = v['tag'] + (' (latest)' if v['tag'] == tag else '')
          json.dump(data, sys.stdout, indent=2)
          " > docs/public/versions.json.tmp
          mv docs/public/versions.json.tmp docs/public/versions.json

      - name: Commit versions.json
        run: |
          # The job runs in detached HEAD at the release tag. Earlier
          # steps (GoReleaser, the python pipeline above) leave
          # untracked / modified files in the workspace, which makes
          # `git rebase` blow up with "cannot rebase: You have
          # unstaged changes". Sidestep the rebase entirely: stash the
          # versions.json change, switch to a fresh main checkout, and
          # apply only that one file there before committing + pushing.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs/public/versions.json; then
            echo "no versions.json change; nothing to commit"
            exit 0
          fi
          cp docs/public/versions.json /tmp/versions.json
          git fetch origin main
          git checkout -B main origin/main
          cp /tmp/versions.json docs/public/versions.json
          git add docs/public/versions.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update versions.json for ${GITHUB_REF#refs/tags/}"
          git push origin main
