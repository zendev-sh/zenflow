name: Test install scripts

# Manual-trigger smoke for the one-command install paths advertised in
# README § Install. Each runner installs zenflow via the OS-appropriate
# script and then exercises the no-LLM CLI surface (--version, validate,
# plan) against a tiny embedded workflow. This is enough to catch the
# common Windows-incompatibility classes (path separators, OS-aware
# fixtures, file extensions in flag values) without needing an LLM API
# key.
#
# Real tool-execution (`zenflow flow` against an LLM provider, exercising
# bash / read / write / glob / grep tools end-to-end) is a separate
# follow-up that requires provider credentials in repo secrets.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install-sh:
    name: install.sh on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: curl | sh
        # Pass GITHUB_TOKEN through so install.sh's `api.github.com`
        # release-tag lookup uses the authenticated 5000/h rate-limit
        # instead of the 60/h anonymous one (shared CI egress IPs hit
        # the anon limit constantly).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: curl -fsSL https://zenflow.sh/install.sh | GITHUB_TOKEN="$GITHUB_TOKEN" sh

      - name: write sample workflow
        run: |
          mkdir -p /tmp/zenflow-smoke
          cat > /tmp/zenflow-smoke/sample.yaml <<'EOF'
          version: 1
          name: smoke-flow
          agents:
            writer:
              description: writer agent
              model: google/gemini-3-flash-preview
              prompt: write something
          steps:
            - id: first
              agent: writer
              instructions: produce a one-line summary
            - id: second
              agent: writer
              dependsOn: [first]
              instructions: extend the summary
          EOF

      - name: zenflow --version
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          zenflow --version
          zenflow --version | grep -q '^zenflow 0\.' || { echo "unexpected version output"; exit 1; }

      - name: zenflow validate
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          zenflow validate /tmp/zenflow-smoke/sample.yaml

      - name: zenflow plan
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          zenflow plan /tmp/zenflow-smoke/sample.yaml

  install-ps1:
    name: install.ps1 on windows-latest
    runs-on: windows-latest
    steps:
      - name: iwr | iex
        shell: pwsh
        # Pass GITHUB_TOKEN through so install.ps1's release-tag lookup
        # uses the 5000/h authenticated rate-limit. windows-latest
        # runners share a smaller egress IP pool than ubuntu/macos but
        # the auth header is still good hygiene.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          iwr -useb https://zenflow.sh/install.ps1 | iex

      - name: write sample workflow
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\zenflow-smoke | Out-Null
          @'
          version: 1
          name: smoke-flow
          agents:
            writer:
              description: writer agent
              model: google/gemini-3-flash-preview
              prompt: write something
          steps:
            - id: first
              agent: writer
              instructions: produce a one-line summary
            - id: second
              agent: writer
              dependsOn: [first]
              instructions: extend the summary
          '@ | Set-Content -Path C:\zenflow-smoke\sample.yaml -Encoding utf8

      - name: zenflow --version
        shell: pwsh
        run: |
          $InstallDir = Join-Path $env:LOCALAPPDATA 'Programs\zenflow'
          $env:Path = "$InstallDir;$env:Path"
          zenflow --version
          if (-not ((zenflow --version) -match '^zenflow 0\.')) {
            Write-Error "unexpected version output"
            exit 1
          }

      - name: zenflow validate
        shell: pwsh
        run: |
          $InstallDir = Join-Path $env:LOCALAPPDATA 'Programs\zenflow'
          $env:Path = "$InstallDir;$env:Path"
          zenflow validate C:\zenflow-smoke\sample.yaml

      - name: zenflow plan
        shell: pwsh
        run: |
          $InstallDir = Join-Path $env:LOCALAPPDATA 'Programs\zenflow'
          $env:Path = "$InstallDir;$env:Path"
          zenflow plan C:\zenflow-smoke\sample.yaml

  # Real tool-execution against a Gemini Flash model. Catches Windows-
  # specific tool failures the no-LLM smoke above cannot reach: bash
  # invocation, file IO via read/write, glob/grep path resolution.
  # Skipped automatically if GEMINI_API_KEY isn't set on the repo
  # (forks etc).
  tool-execution:
    name: zenflow flow on ${{ matrix.os }} (real LLM)
    runs-on: ${{ matrix.os }}
    if: ${{ github.repository == 'zendev-sh/zenflow' }}
    strategy:
      fail-fast: false
      # Serialise the matrix so 3 OSes do not hit the Gemini free-tier
      # 5-requests-per-minute quota in parallel. Each row needs about
      # 2 generate calls (agent + coord finalize), so back-to-back is
      # well within budget.
      max-parallel: 1
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: install zenflow (Unix)
        if: runner.os != 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: curl -fsSL https://zenflow.sh/install.sh | GITHUB_TOKEN="$GITHUB_TOKEN" sh

      - name: install zenflow (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          iwr -useb https://zenflow.sh/install.ps1 | iex

      - name: write tool-exercising workflow (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p /tmp/zf-tool
          cat > /tmp/zf-tool/flow.yaml <<'EOF'
          version: 1
          name: smoke-tool
          agents:
            scribe:
              description: writes one short fact to disk
              model: google/gemini-3-flash-preview
              prompt: |
                You are a careful scribe. Use the write tool to create
                a file `note.txt` containing the literal string
                "zenflow tool-execution OK on $RUNNER_OS", then stop.
                Do not write anything else.
              tools:
                - write
          steps:
            - id: write_note
              agent: scribe
              instructions: |
                Use the write tool exactly once with path "note.txt"
                and content "zenflow tool-execution OK on $RUNNER_OS".
          EOF

      - name: write tool-exercising workflow (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\zf-tool | Out-Null
          @'
          version: 1
          name: smoke-tool
          agents:
            scribe:
              description: writes one short fact to disk
              model: google/gemini-3-flash-preview
              prompt: |
                You are a careful scribe. Use the write tool to create
                a file `note.txt` containing the literal string
                "zenflow tool-execution OK on $RUNNER_OS", then stop.
                Do not write anything else.
              tools:
                - write
          steps:
            - id: write_note
              agent: scribe
              instructions: |
                Use the write tool exactly once with path "note.txt"
                and content "zenflow tool-execution OK on $RUNNER_OS".
          '@ | Set-Content -Path C:\zf-tool\flow.yaml -Encoding utf8

      - name: zenflow flow (Unix)
        if: runner.os != 'Windows'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # Tolerate a non-zero `zenflow flow` exit (the coord's finalize
        # step can hit a transient quota error after the write tool
        # already ran) and assert on the artifact instead. The write
        # tool itself is what we are verifying, not the full happy path.
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd /tmp/zf-tool
          set +e
          zenflow flow flow.yaml --workdir /tmp/zf-tool --yolo --model google/gemini-3-flash-preview
          set -e
          if [ ! -f /tmp/zf-tool/note.txt ]; then
            echo "note.txt was not created by the write tool" >&2
            exit 1
          fi
          content=$(cat /tmp/zf-tool/note.txt)
          echo "note.txt content: $content"
          if ! grep -q 'zenflow tool-execution OK' /tmp/zf-tool/note.txt; then
            echo "note.txt content unexpected: $content" >&2
            exit 1
          fi

      - name: zenflow flow (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # Tolerate a non-zero `zenflow flow` exit (see Unix step
        # comment) and assert on the artifact instead.
        run: |
          $InstallDir = Join-Path $env:LOCALAPPDATA 'Programs\zenflow'
          $env:Path = "$InstallDir;$env:Path"
          Set-Location C:\zf-tool
          $ErrorActionPreference = 'Continue'
          zenflow flow flow.yaml --workdir C:\zf-tool --yolo --model google/gemini-3-flash-preview
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path C:\zf-tool\note.txt)) {
            Write-Error "note.txt was not created by the write tool"
            exit 1
          }
          $content = Get-Content -Raw C:\zf-tool\note.txt
          Write-Host "note.txt content: $content"
          if ($content -notmatch 'zenflow tool-execution OK') {
            Write-Error "note.txt content unexpected: $content"
            exit 1
          }
