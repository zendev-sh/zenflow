name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel stale CI runs when a new commit lands on the same branch /
# PR head. main pushes do not auto-cancel (cancel-in-progress is
# false on push events) so a release sequence is not interrupted.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: ${{ matrix.os }} / Go ${{ matrix.go-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.25']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build library
        run: go build ./...

      - name: Build CLI
        run: go build ./cmd/zenflow/

      - name: Test (race)
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Smoke-check examples
        if: runner.os != 'Windows'
        run: ./scripts/smoke-examples.sh

      - name: Coverage summary
        if: runner.os == 'Linux'
        run: |
          total=$(go tool cover -func=coverage.txt | grep ^total | awk '{print $3}')
          echo "Coverage: $total"

      - name: Upload to Codecov
        if: runner.os == 'Linux'
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          files: coverage.txt
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6.5.2
        with:
          version: v1.64.8

      - name: go vet
        run: go vet ./...

  schema:
    name: spec/v1 schema conformance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Install ajv-cli
        run: npm install -g ajv-cli ajv-formats

      - name: Run schema test harness
        working-directory: spec/v1
        run: bash test_schema.sh
